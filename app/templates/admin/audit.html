<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>借还审计日志 - 设备管理系统</title>
    <style>
        :root {
            --primary-color: #059669;
            --bg-color: #f1f5f9;
            --text-main: #334155;
            --border-color: #e2e8f0;
        }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 2px solid var(--bg-color); padding-bottom: 15px; }
        .header h2 { margin: 0; color: var(--primary-color); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 600; }
        tr:hover { background-color: #f8fafc; }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-borrowing { background: #fee2e2; color: #991b1b; }
        .status-returned { background: #dcfce7; color: #166534; }

        .nav-links a { color: var(--primary-color); text-decoration: none; font-weight: bold; margin-left: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📝 全局借还审计日志</h2>
        <div class="nav-links">
            <a href="/dashboard">返回工作台</a>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>操作记录ID</th>
                <th>设备名称</th>
                <th>序列号</th>
                <th>借用人</th>
                <th>科室</th>
                <th>借出时间</th>
                <th>归还时间</th>
                <th>当前状态</th>
            </tr>
        </thead>
        <tbody id="auditTableBody">
            </tbody>
    </table>
</div>

<script>
    document.addEventListener('DOMContentLoaded', fetchAuditLogs);

    function fetchAuditLogs() {
        fetch('/admin/api/audit/list')
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    renderTable(data.data);
                } else {
                    alert('权限不足或获取失败');
                    window.location.href = '/dashboard';
                }
            })
            .catch(err => console.error('Error:', err));
    }

    function renderTable(logs) {
        const tbody = document.getElementById('auditTableBody');
        if (logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">暂无任何借还记录</td></tr>';
            return;
        }

        tbody.innerHTML = logs.map(log => `
            <tr>
                <td>#${log.id}</td>
                <td><strong>${log.equipment_name}</strong></td>
                <td><code>${log.serial_number}</code></td>
                <td>${log.user_name}</td>
                <td>${log.department}</td>
                <td>${log.borrow_time}</td>
                <td>${log.return_time}</td>
                <td>
                    <span class="status-badge ${log.status === '借用中' ? 'status-borrowing' : 'status-returned'}">
                        ${log.status}
                    </span>
                </td>
            </tr>
        `).join('');
    }
</script>

</body>
</html>
