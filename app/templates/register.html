<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>摄影机构学员管理系统 - 学员注册</title>
    <style>
        :root { --primary-color: #059669; --primary-hover: #047857; --bg-color: #f0fdf4; --text-main: #334155; --border-color: #e2e8f0; }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: var(--text-main); }
        .register-wrapper { background-color: #ffffff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); width: 100%; max-width: 480px; }
        h2 { text-align: center; color: var(--primary-color); margin-bottom: 8px; }
        .subtitle { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 24px; }
        .form-row { display: flex; gap: 15px; }
        .form-group { flex: 1; margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; font-size: 14px; background-color: #f8fafc; transition: all 0.3s ease; }
        input:focus, select:focus { border-color: var(--primary-color); background-color: #fff; outline: none; box-shadow: 0 0 0 3px rgba(5,150,105,0.15); }
        .message-box { padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; text-align: center; }
        .error { color: #ef4444; background-color: #fef2f2; border: 1px solid #fecaca; }
        .success { color: #059669; background-color: #ecfdf5; border: 1px solid #a7f3d0; }
        button { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: var(--primary-hover); }
        .link-text { text-align: center; margin-top: 15px; font-size: 13px; }
        .link-text a { color: var(--primary-color); text-decoration: none; }
        .note { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    </style>
</head>
<body>
<div class="register-wrapper">
    <h2>📷 学员注册</h2>
    <p class="subtitle">注册后需等待教务审核通过方可登录</p>
    <form id="registerForm">
        <div class="form-row">
            <div class="form-group">
                <label>登录账号 *</label>
                <input type="text" id="username" required placeholder="如: zhangsan123">
            </div>
            <div class="form-group">
                <label>真实姓名 *</label>
                <input type="text" id="real_name" required placeholder="您的姓名">
            </div>
        </div>

        <div class="form-group">
            <label>摄影水平</label>
            <select id="department">
                <option value="初级">初级 - 零基础入门</option>
                <option value="中级">中级 - 有一定基础</option>
                <option value="高级">高级 - 进阶提升</option>
                <option value="旁听">旁听</option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>联系电话 (选填)</label>
                <input type="text" id="phone" placeholder="方便教务联系">
            </div>
            <div class="form-group">
                <label>注册角色</label>
                <select id="role_name" disabled>
                    <option value="student">学员</option>
                </select>
                <p class="note">教师/教务账号由管理员创建</p>
            </div>
        </div>

        <div class="form-group">
            <label>设置密码 *</label>
            <input type="password" id="password" required placeholder="至少6位密码">
        </div>

        <div id="msgBox" class="message-box"></div>
        <button type="submit" id="regBtn">提交注册申请</button>
        <div class="link-text">已有账号？ <a href="/login">返回登录</a></div>
    </form>
</div>
<script>
    const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
            username: document.getElementById('username').value,
            real_name: document.getElementById('real_name').value,
            department: document.getElementById('department').value,
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value,
            role_name: 'student'
        };
        if (data.password.length < 6) { showMsg('密码长度不能少于6位', 'error'); return; }
        const btn = document.getElementById('regBtn');
        btn.disabled = true;
        btn.innerText = '提交中...';
        fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrfToken},
            body: JSON.stringify(data)
        })
        .then(r => r.json())
        .then(res => {
            if (res.code === 200) {
                showMsg(res.msg + '，3秒后返回登录页', 'success');
                setTimeout(() => { window.location.href = '/login'; }, 3000);
            } else {
                showMsg(res.msg, 'error');
                btn.disabled = false;
                btn.innerText = '提交注册申请';
            }
        })
        .catch(() => {
            showMsg('网络错误，请稍后再试', 'error');
            btn.disabled = false;
            btn.innerText = '提交注册申请';
        });
    });
    function showMsg(text, type) {
        const box = document.getElementById('msgBox');
        box.innerText = text;
        box.className = 'message-box ' + type;
        box.style.display = 'block';
    }
</script>
</body>
</html>
