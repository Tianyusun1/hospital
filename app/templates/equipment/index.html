<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>设备管理 - 医疗设备管理系统</title>
    <style>
        :root {
            --primary-color: #059669;
            --bg-color: #f1f5f9;
            --text-main: #334155;
        }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* 表格样式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #64748b; }

        /* 状态标签 */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-0 { background: #dcfce7; color: #166534; } /* 在库 */
        .badge-1 { background: #fee2e2; color: #991b1b; } /* 借出 */

        /* 按钮样式 */
        .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn-add { background: var(--primary-color); color: white; margin-bottom: 20px; }
        .btn-borrow { background: #3b82f6; color: white; }
        .btn-return { background: #f59e0b; color: white; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* 弹窗样式 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 400px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🏥 医疗设备资产管理</h2>
        <a href="/dashboard" style="text-decoration: none; color: var(--primary-color); font-weight: bold;">返回工作台</a>
    </div>

    {% if role_id == 1 %}
    <button class="btn btn-add" onclick="showModal()">+ 录入新设备</button>
    {% endif %}

    <table>
        <thead>
            <tr>
                <th>设备名称</th>
                <th>序列号</th>
                <th>状态</th>
                <th>录入人</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="equipmentTableBody">
            </tbody>
    </table>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>录入新设备</h3>
        <div class="form-group">
            <label>设备名称</label>
            <input type="text" id="eq_name" placeholder="如：除颤仪">
        </div>
        <div class="form-group">
            <label>序列号 (S/N)</label>
            <input type="text" id="eq_sn" placeholder="唯一编号">
        </div>
        <div style="text-align: right;">
            <button class="btn" onclick="hideModal()">取消</button>
            <button class="btn btn-add" onclick="submitAdd()">确认提交</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', fetchEquipments);

    function fetchEquipments() {
        fetch('/equipment/api/list')
            .then(res => res.json())
            .then(res => {
                if(res.code === 200) renderTable(res.data);
            });
    }

    function renderTable(data) {
        const tbody = document.getElementById('equipmentTableBody');
        tbody.innerHTML = data.map(eq => `
            <tr>
                <td><strong>${eq.name}</strong></td>
                <td><code>${eq.serial_number}</code></td>
                <td><span class="badge badge-${eq.status_code}">${eq.status_text}</span></td>
                <td>${eq.added_by}</td>
                <td>
                    ${eq.status_code === 0 ?
                        `<button class="btn btn-borrow" onclick="handleAction(${eq.id}, 'borrow')">立即借用</button>` :
                        `<button class="btn btn-return" onclick="handleAction(${eq.id}, 'return')">归还设备</button>`
                    }
                </td>
            </tr>
        `).join('');
    }

    function handleAction(id, action) {
        const url = `/equipment/api/${action}`;
        fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ equipment_id: id })
        })
        .then(res => res.json())
        .then(res => {
            alert(res.msg);
            fetchEquipments();
        });
    }

    // 弹窗控制
    function showModal() { document.getElementById('addModal').style.display = 'flex'; }
    function hideModal() { document.getElementById('addModal').style.display = 'none'; }

    function submitAdd() {
        const name = document.getElementById('eq_name').value;
        const sn = document.getElementById('eq_sn').value;
        fetch('/equipment/api/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: name, serial_number: sn })
        })
        .then(res => res.json())
        .then(res => {
            alert(res.msg);
            if(res.code === 200) {
                hideModal();
                fetchEquipments();
            }
        });
    }
</script>
</body>
</html>
