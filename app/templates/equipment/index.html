<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>设备管理 - 医疗设备管理系统</title>
    <style>
        :root {
            --primary-color: #059669;
            --bg-color: #f1f5f9;
            --text-main: #334155;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --gray-color: #64748b;
        }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* 表格样式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background-color: #f8fafc; color: #64748b; }

        /* 状态标签 */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; }
        .badge-0 { background: #dcfce7; color: #166534; } /* 在库 */
        .badge-1 { background: #e0f2fe; color: #0369a1; } /* 借出 */
        .badge-2 { background: #fef3c7; color: #92400e; } /* 维修中 */
        .badge-3 { background: #fee2e2; color: #991b1b; } /* 报废 */
        .badge-overdue { background: var(--danger-color); color: white; animation: pulse 2s infinite; } /* 逾期高亮 */

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; }
        }

        /* 按钮样式 */
        .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; font-weight: bold; }
        .btn-add { background: var(--primary-color); color: white; margin-bottom: 20px; }
        .btn-borrow { background: #3b82f6; color: white; }
        .btn-return { background: var(--warning-color); color: white; }
        .btn-edit { background: var(--gray-color); color: white; }
        .btn-status { background: #4b5563; color: white; } /* 状态管理按钮 */

        .btn:hover { opacity: 0.8; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* 弹窗样式 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 450px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🏥 医疗设备资产管理</h2>
        <a href="/dashboard" style="text-decoration: none; color: var(--primary-color); font-weight: bold;">返回工作台</a>
    </div>

    {% if role_id == 1 %}
    <button class="btn btn-add" onclick="showAddModal()">+ 录入新设备</button>
    {% endif %}

    <table>
        <thead>
            <tr>
                <th>设备名称</th>
                <th>序列号</th>
                <th>规格描述</th>
                <th>状态/应还时间</th>
                <th>录入人</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="equipmentTableBody"></tbody>
    </table>
</div>

<div id="eqModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">录入新设备</h3>
        <input type="hidden" id="edit_id">
        <div class="form-group">
            <label>设备名称 *</label>
            <input type="text" id="eq_name" placeholder="如：多参数监护仪">
        </div>
        <div class="form-group">
            <label>序列号 (S/N) *</label>
            <input type="text" id="eq_sn" placeholder="唯一编号">
        </div>
        <div class="form-group">
            <label>规格参数</label>
            <textarea id="eq_spec" rows="3" placeholder="如：12.1寸屏, 含血氧监测"></textarea>
        </div>
        <div style="text-align: right; margin-top: 20px;">
            <button class="btn" style="background: #e2e8f0; color: #334155;" onclick="hideModal('eqModal')">取消</button>
            <button class="btn btn-add" id="submitBtn" onclick="saveEquipment()">确认提交</button>
        </div>
    </div>
</div>

<div id="borrowModal" class="modal">
    <div class="modal-content">
        <h3>确认借用设备</h3>
        <p id="borrow_info" style="font-size: 14px; color: #64748b;"></p>
        <input type="hidden" id="borrow_eq_id">
        <div class="form-group">
            <label>预计归还日期 *</label>
            <input type="date" id="borrow_return_date">
            <small style="color: #94a3b8;">请根据实际需求选择归还时限</small>
        </div>
        <div style="text-align: right; margin-top: 20px;">
            <button class="btn" style="background: #e2e8f0; color: #334155;" onclick="hideModal('borrowModal')">取消</button>
            <button class="btn btn-borrow" onclick="submitBorrow()">确认借用</button>
        </div>
    </div>
</div>

<div id="statusModal" class="modal">
    <div class="modal-content">
        <h3>设备状态强制管理</h3>
        <p id="status_eq_info" style="font-size: 14px; color: #64748b;"></p>
        <input type="hidden" id="status_eq_id">

        <div class="form-group">
            <label>目标状态 *</label>
            <select id="target_status">
                <option value="0">在库 (正常可用)</option>
                <option value="2">维修中 (暂时下线)</option>
                <option value="3">报废 (永久下线)</option>
            </select>
        </div>

        <div class="form-group">
            <label>变更原因/备注 *</label>
            <textarea id="status_note" rows="2" placeholder="请详细说明原因，如：年度质控检查、硬件故障、超过使用年限等"></textarea>
        </div>

        <div style="text-align: right; margin-top: 20px;">
            <button class="btn" style="background: #e2e8f0; color: #334155;" onclick="hideModal('statusModal')">取消</button>
            <button class="btn btn-edit" onclick="submitStatusChange()">确认变更</button>
        </div>
    </div>
</div>

<script>
    const currentUserRole = {{ role_id | default(0) }};
    document.addEventListener('DOMContentLoaded', fetchEquipments);

    function fetchEquipments() {
        fetch('/equipment/api/list')
            .then(res => res.json())
            .then(res => {
                if(res.code === 200) renderTable(res.data);
            });
    }

    function renderTable(data) {
        const tbody = document.getElementById('equipmentTableBody');
        tbody.innerHTML = data.map(eq => {
            let statusHtml = `<span class="badge badge-${eq.status_code}">${eq.status_text}</span>`;
            if (eq.is_overdue) {
                statusHtml = `<span class="badge badge-overdue">逾期 (应还: ${eq.due_time})</span>`;
            } else if (eq.status_code === 1) {
                statusHtml += `<br><small style="color:#64748b">应还: ${eq.due_time}</small>`;
            }

            return `
                <tr>
                    <td><strong>${eq.name}</strong></td>
                    <td><code>${eq.serial_number}</code></td>
                    <td><small>${eq.specification || '暂无说明'}</small></td>
                    <td>${statusHtml}</td>
                    <td>${eq.added_by}</td>
                    <td>
                        <div style="display: flex; gap: 5px;">
                            ${eq.status_code === 0 ?
                                `<button class="btn btn-borrow" onclick="showBorrowModal(${eq.id}, '${eq.name}')">立即借用</button>` : ''
                            }
                            ${eq.status_code === 1 ?
                                `<button class="btn btn-return" onclick="handleReturn(${eq.id})">归还</button>` : ''
                            }
                            ${currentUserRole === 1 ?
                                `<button class="btn btn-edit" onclick="showEditModal(${JSON.stringify(eq).replace(/"/g, '&quot;')})">编辑</button>
                                 <button class="btn btn-status" onclick="showStatusModal(${eq.id}, '${eq.name}', ${eq.status_code})">状态管理</button>` : ''
                            }
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // --- 借用逻辑 ---
    function showBorrowModal(id, name) {
        document.getElementById('borrow_eq_id').value = id;
        document.getElementById('borrow_info').innerText = `正在借用设备：${name}`;
        const today = new Date().toISOString().split('T')[0];
        const dateInput = document.getElementById('borrow_return_date');
        dateInput.setAttribute('min', today);
        dateInput.value = "";
        document.getElementById('borrowModal').style.display = 'flex';
    }

    function submitBorrow() {
        const id = document.getElementById('borrow_eq_id').value;
        const returnDate = document.getElementById('borrow_return_date').value;
        if(!returnDate) { alert("请选择预计归还日期"); return; }

        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        fetch(`/equipment/api/borrow`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
            body: JSON.stringify({ equipment_id: id, return_date: returnDate })
        })
        .then(res => res.json())
        .then(res => {
            alert(res.msg);
            if(res.code === 200) { hideModal('borrowModal'); fetchEquipments(); }
        });
    }

    // --- 强制状态管理 (管理员专用) ---
    function showStatusModal(id, name, currentStatus) {
        if (currentStatus === 1) {
            alert("设备正在借用中，请先由借用人归还后再调整状态。");
            return;
        }
        document.getElementById('status_eq_id').value = id;
        document.getElementById('status_eq_info').innerText = `当前管理设备：${name}`;
        document.getElementById('target_status').value = currentStatus;
        document.getElementById('status_note').value = "";
        document.getElementById('statusModal').style.display = 'flex';
    }

    function submitStatusChange() {
        const id = document.getElementById('status_eq_id').value;
        const status = parseInt(document.getElementById('target_status').value);
        const note = document.getElementById('status_note').value;
        if(!note) { alert("请输入变更原因备注"); return; }

        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        fetch('/equipment/api/admin/update_status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
            body: JSON.stringify({ equipment_id: id, status: status, note: note })
        })
        .then(res => res.json())
        .then(res => {
            alert(res.msg);
            if(res.code === 200) { hideModal('statusModal'); fetchEquipments(); }
        });
    }

    // --- 归还处理 ---
    function handleReturn(id) {
        if(!confirm('确定归还该设备吗？')) return;
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        fetch(`/equipment/api/return`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
            body: JSON.stringify({ equipment_id: id })
        })
        .then(res => res.json())
        .then(res => {
            if (res.risk_warning) alert("归还成功，风险预警：" + res.risk_warning);
            else alert(res.msg);
            fetchEquipments();
        });
    }

    // --- 基础弹窗逻辑 ---
    function showAddModal() {
        resetForm();
        document.getElementById('modalTitle').innerText = '录入新设备';
        document.getElementById('eqModal').style.display = 'flex';
    }

    function showEditModal(eq) {
        resetForm();
        document.getElementById('modalTitle').innerText = '编辑设备信息';
        document.getElementById('edit_id').value = eq.id;
        document.getElementById('eq_name').value = eq.name;
        document.getElementById('eq_sn').value = eq.serial_number;
        document.getElementById('eq_sn').disabled = true;
        document.getElementById('eq_spec').value = eq.specification;
        document.getElementById('eqModal').style.display = 'flex';
    }

    function hideModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

    function resetForm() {
        document.getElementById('edit_id').value = '';
        document.getElementById('eq_name').value = '';
        document.getElementById('eq_sn').value = '';
        document.getElementById('eq_sn').disabled = false;
        document.getElementById('eq_spec').value = '';
    }

    function saveEquipment() {
        const id = document.getElementById('edit_id').value;
        const url = id ? '/equipment/api/update' : '/equipment/api/add';
        const data = {
            name: document.getElementById('eq_name').value,
            serial_number: document.getElementById('eq_sn').value,
            specification: document.getElementById('eq_spec').value
        };
        if (id) data.id = id;

        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(res => {
            alert(res.msg);
            if(res.code === 200) { hideModal('eqModal'); fetchEquipments(); }
        });
    }
</script>
</body>
</html>
