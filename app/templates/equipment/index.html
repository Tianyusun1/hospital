<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>设备管理 - 医疗设备管理系统</title>
    <style>
        :root {
            --primary-color: #059669;
            --bg-color: #f1f5f9;
            --text-main: #334155;
            --danger-color: #ef4444;
        }
        body { font-family: 'PingFang SC', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* 表格样式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background-color: #f8fafc; color: #64748b; }

        /* 状态标签 */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; }
        .badge-0 { background: #dcfce7; color: #166534; } /* 在库 */
        .badge-1 { background: #e0f2fe; color: #0369a1; } /* 借出 */
        .badge-overdue { background: var(--danger-color); color: white; animation: pulse 2s infinite; } /* 逾期高亮 */

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; }
        }

        /* 按钮样式 */
        .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; font-weight: bold; }
        .btn-add { background: var(--primary-color); color: white; margin-bottom: 20px; }
        .btn-borrow { background: #3b82f6; color: white; }
        .btn-return { background: #f59e0b; color: white; }
        .btn-edit { background: #64748b; color: white; }
        .btn:hover { opacity: 0.8; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* 弹窗样式 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 450px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🏥 医疗设备资产管理</h2>
        <a href="/dashboard" style="text-decoration: none; color: var(--primary-color); font-weight: bold;">返回工作台</a>
    </div>

    {% if role_id == 1 %}
    <button class="btn btn-add" onclick="showAddModal()">+ 录入新设备</button>
    {% endif %}

    <table>
        <thead>
            <tr>
                <th>设备名称</th>
                <th>序列号</th>
                <th>规格描述</th> <th>状态/应还时间</th>
                <th>录入人</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="equipmentTableBody"></tbody>
    </table>
</div>

<div id="eqModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">录入新设备</h3>
        <input type="hidden" id="edit_id">
        <div class="form-group">
            <label>设备名称 *</label>
            <input type="text" id="eq_name" placeholder="如：多参数监护仪">
        </div>
        <div class="form-group">
            <label>序列号 (S/N) *</label>
            <input type="text" id="eq_sn" placeholder="唯一编号">
        </div>
        <div class="form-group">
            <label>规格参数</label>
            <textarea id="eq_spec" rows="3" placeholder="如：12.1寸屏, 含血氧监测"></textarea>
        </div>
        <div style="text-align: right; margin-top: 20px;">
            <button class="btn" style="background: #e2e8f0; color: #334155;" onclick="hideModal()">取消</button>
            <button class="btn btn-add" id="submitBtn" onclick="saveEquipment()">确认提交</button>
        </div>
    </div>
</div>

<script>
    const currentUserRole = {{ role_id | default(0) }};
    document.addEventListener('DOMContentLoaded', fetchEquipments);

    function fetchEquipments() {
        fetch('/equipment/api/list')
            .then(res => res.json())
            .then(res => {
                if(res.code === 200) renderTable(res.data);
            });
    }

    function renderTable(data) {
        const tbody = document.getElementById('equipmentTableBody');
        tbody.innerHTML = data.map(eq => {
            // 逾期判定显示
            let statusHtml = `<span class="badge badge-${eq.status_code}">${eq.status_text}</span>`;
            if (eq.is_overdue) {
                statusHtml = `<span class="badge badge-overdue">逾期 (应还: ${eq.due_time})</span>`;
            } else if (eq.status_code === 1) {
                statusHtml += `<br><small style="color:#64748b">应还: ${eq.due_time}</small>`;
            }

            return `
                <tr>
                    <td><strong>${eq.name}</strong></td>
                    <td><code>${eq.serial_number}</code></td>
                    <td><small>${eq.specification || '暂无说明'}</small></td>
                    <td>${statusHtml}</td>
                    <td>${eq.added_by}</td>
                    <td>
                        <div style="display: flex; gap: 5px;">
                            ${eq.status_code === 0 ?
                                `<button class="btn btn-borrow" onclick="handleBorrow(${eq.id})">立即借用</button>` :
                                `<button class="btn btn-return" onclick="handleReturn(${eq.id})">归还</button>`
                            }
                            ${currentUserRole === 1 ?
                                `<button class="btn btn-edit" onclick="showEditModal(${JSON.stringify(eq).replace(/"/g, '&quot;')})">编辑</button>` : ''
                            }
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // 借用处理 (默认借用7天)
    function handleBorrow(id) {
        if(!confirm('确定借用该设备吗？默认借用期为7天。')) return;
        handleAction(id, 'borrow', { days: 7 });
    }

    function handleReturn(id) {
        handleAction(id, 'return');
    }

    function handleAction(id, action, extraData = {}) {
        fetch(`/equipment/api/${action}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ equipment_id: id, ...extraData })
        })
        .then(res => res.json())
        .then(res => {
            alert(res.msg);
            fetchEquipments();
        });
    }

    // 弹窗逻辑
    function showAddModal() {
        resetForm();
        document.getElementById('modalTitle').innerText = '录入新设备';
        document.getElementById('eqModal').style.display = 'flex';
    }

    function showEditModal(eq) {
        resetForm();
        document.getElementById('modalTitle').innerText = '编辑设备信息';
        document.getElementById('edit_id').value = eq.id;
        document.getElementById('eq_name').value = eq.name;
        document.getElementById('eq_sn').value = eq.serial_number;
        document.getElementById('eq_sn').disabled = true; // 序列号通常不可改
        document.getElementById('eq_spec').value = eq.specification;
        document.getElementById('eqModal').style.display = 'flex';
    }

    function hideModal() { document.getElementById('eqModal').style.display = 'none'; }

    function resetForm() {
        document.getElementById('edit_id').value = '';
        document.getElementById('eq_name').value = '';
        document.getElementById('eq_sn').value = '';
        document.getElementById('eq_sn').disabled = false;
        document.getElementById('eq_spec').value = '';
    }

    function saveEquipment() {
        const id = document.getElementById('edit_id').value;
        const url = id ? '/equipment/api/update' : '/equipment/api/add';
        const data = {
            name: document.getElementById('eq_name').value,
            serial_number: document.getElementById('eq_sn').value,
            specification: document.getElementById('eq_spec').value
        };
        if (id) data.id = id;

        fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(res => {
            alert(res.msg);
            if(res.code === 200) {
                hideModal();
                fetchEquipments();
            }
        });
    }
</script>
</body>
</html>
